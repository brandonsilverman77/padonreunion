<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Padon Reunion</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --nav-height: 88px;
    --accent: #ffffff;
  }

  html, body {
    height: 100%;
    background: #0a0a0a;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    overflow: hidden;
  }

  /* ---- Featured photo stage ---- */
  #stage {
    position: fixed;
    inset: 0;
    background: #0a0a0a;
    touch-action: none;   /* we handle horizontal drag ourselves */
    cursor: grab;
  }
  #stage.dragging { cursor: grabbing; }

  .slide {
    position: absolute;
    inset: 0;
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
    opacity: 0;
    transition: opacity 0.7s ease;
    pointer-events: none;
  }
  .slide.active {
    opacity: 1;
  }

  /* subtle gradient so the nav bar stays legible over any photo */
  #scrim {
    position: fixed;
    left: 0;
    right: 0;
    bottom: 0;
    height: 240px;
    background: linear-gradient(to top, rgba(0,0,0,0.75), rgba(0,0,0,0));
    pointer-events: none;
    z-index: 5;
  }

  /* year label, top-left */
  #yearLabel {
    position: fixed;
    top: 28px;
    left: 32px;
    z-index: 10;
    color: #fff;
    font-family: "Bebas Neue", sans-serif;
    font-size: clamp(52px, 10vw, 120px);
    font-weight: 400;
    letter-spacing: 0.04em;
    line-height: 1;
    text-shadow: 0 2px 24px rgba(0,0,0,0.5);
    user-select: none;
    pointer-events: none;
  }

  /* ---- Bottom nav ---- */
  #nav {
    position: fixed;
    left: 0;
    right: 0;
    bottom: 0;
    height: var(--nav-height);
    z-index: 20;
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 0 24px;
    overflow-x: auto;
    overflow-y: hidden;
    scrollbar-width: none;
    -webkit-overflow-scrolling: touch;
  }
  #nav::-webkit-scrollbar { display: none; }

  .year-btn {
    flex: 0 0 auto;
    background: none;
    border: none;
    color: rgba(255,255,255,0.6);
    font-family: "Bebas Neue", sans-serif;
    font-size: 30px;
    font-weight: 400;
    letter-spacing: 0.06em;
    padding: 8px 20px;
    cursor: pointer;
    border-radius: 999px;
    transition: color 0.25s ease, background 0.25s ease;
    text-shadow: 0 1px 12px rgba(0,0,0,0.6);
    white-space: nowrap;
  }
  .year-btn:hover { color: #fff; }
  .year-btn.active {
    color: #0a0a0a;
    background: #fff;
    text-shadow: none;
  }

  /* one-time hint on touch devices */
  #hint {
    position: fixed;
    left: 50%;
    bottom: calc(var(--nav-height) + 22px);
    transform: translateX(-50%);
    z-index: 15;
    color: #fff;
    font-family: "Bebas Neue", sans-serif;
    font-size: 19px;
    letter-spacing: 0.08em;
    padding: 8px 20px;
    border-radius: 999px;
    background: rgba(0,0,0,0.35);
    -webkit-backdrop-filter: blur(6px);
    backdrop-filter: blur(6px);
    white-space: nowrap;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.6s ease;
  }
  #hint.show { opacity: 1; }
</style>
</head>
<body>
  <div id="stage"></div>
  <div id="scrim"></div>
  <div id="yearLabel"></div>
  <div id="hint">&#8592;&nbsp;&nbsp;swipe to see more&nbsp;&nbsp;&#8594;</div>
  <nav id="nav"></nav>

<script>
  // Each entry: the year (label) and its photo file.
  // Add a new reunion by dropping the photo in this folder and adding a line here.
  const PHOTOS = [
    { year: "2026", src: "2026.jpeg" },
    { year: "2025", src: "2025.jpeg" },
    { year: "2024", src: "2024.jpeg" },
    { year: "2021", src: "2021.jpg" },
    { year: "2020", src: "2020.jpg" },
    { year: "2019", src: "2019.jpg" },
    { year: "2018", src: "2018.jpg" },
    { year: "2010", src: "2010.jpeg" },
  ];

  const stage = document.getElementById("stage");
  const nav = document.getElementById("nav");
  const yearLabel = document.getElementById("yearLabel");

  const slides = [];
  const buttons = [];
  const panX = [];   // remembered horizontal pan (%) per photo

  PHOTOS.forEach((p, i) => {
    const slide = document.createElement("div");
    slide.className = "slide";
    slide.style.backgroundImage = `url("${encodeURI(p.src)}")`;
    slide.style.backgroundPositionX = "50%";
    stage.appendChild(slide);
    slides.push(slide);
    panX.push(50);

    const btn = document.createElement("button");
    btn.className = "year-btn";
    btn.textContent = p.year;
    btn.addEventListener("click", () => show(i));
    nav.appendChild(btn);
    buttons.push(btn);
  });

  let current = -1;

  function show(i) {
    if (i === current) return;
    slides.forEach((s, idx) => s.classList.toggle("active", idx === i));
    buttons.forEach((b, idx) => b.classList.toggle("active", idx === i));
    yearLabel.textContent = PHOTOS[i].year;
    current = i;
    // keep the selected year comfortably in view within the scroller
    buttons[i].scrollIntoView({ behavior: "smooth", inline: "center", block: "nearest" });
  }

  // ---- Drag to pan the photo horizontally (reveals the cropped sides) ----
  let dragging = false, startX = 0, startPos = 50;

  stage.addEventListener("pointerdown", (e) => {
    dragging = true;
    startX = e.clientX;
    startPos = panX[current];
    stage.classList.add("dragging");
    stage.setPointerCapture(e.pointerId);
    dismissHint();
  });

  stage.addEventListener("pointermove", (e) => {
    if (!dragging) return;
    // a full screen-width drag sweeps the whole photo, left to right
    const deltaPct = ((e.clientX - startX) / stage.clientWidth) * 100;
    const pos = Math.max(0, Math.min(100, startPos - deltaPct));
    panX[current] = pos;
    slides[current].style.backgroundPositionX = pos + "%";
  });

  function endDrag(e) {
    if (!dragging) return;
    dragging = false;
    stage.classList.remove("dragging");
    if (e.pointerId != null && stage.hasPointerCapture(e.pointerId)) {
      stage.releasePointerCapture(e.pointerId);
    }
  }
  stage.addEventListener("pointerup", endDrag);
  stage.addEventListener("pointercancel", endDrag);

  // ---- One-time swipe hint on touch devices ----
  const hint = document.getElementById("hint");
  let hintShown = false;
  function dismissHint() {
    if (!hintShown) return;
    hint.classList.remove("show");
    hintShown = false;
  }
  if (window.matchMedia && window.matchMedia("(pointer: coarse)").matches) {
    hint.classList.add("show");
    hintShown = true;
    setTimeout(dismissHint, 4500);
  }

  // Arrow keys to move between years
  document.addEventListener("keydown", (e) => {
    if (e.key === "ArrowRight") show(Math.min(current + 1, PHOTOS.length - 1));
    if (e.key === "ArrowLeft")  show(Math.max(current - 1, 0));
  });

  // Start on the most recent reunion (now first in the list)
  show(0);
</script>
</body>
</html>
